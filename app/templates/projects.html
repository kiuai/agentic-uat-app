{% extends "base.html" %}
{% block content %}
  <h1>Projects</h1>

  <div class="grid">
    <div class="card">
      <h2>Create project</h2>
      <form method="post" action="/ui/projects" class="form">
        <label>Name</label>
        <input name="name" required />
        <label>Description</label>
        <textarea name="description" rows="3"></textarea>
        <button type="submit">Create</button>
      </form>
    </div>

    <div class="card">
      <h2>Existing projects</h2>
      <table class="table">
        <thead><tr><th>ID</th><th>Name</th><th>Requirements</th></tr></thead>
        <tbody>
        {% for p in projects %}
          <tr>
            <td>{{ p.id }}</td>
            <td><strong>{{ p.name }}</strong></td>
            <td><a class="link" href="/ui/requirements/{{ p.id }}">Open →</a></td>
          </tr>
        {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
{% endblock %}
