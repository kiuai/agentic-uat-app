name: CI

on:
  push:
    branches-ignore:
      - main
      - "release/**"
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend Lint ──────────────────────────────────────────────────────────────
  backend-lint:
    name: Backend — Lint & Type-check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install lint tools
        run: pip install ruff mypy

      - name: Install package (for mypy imports)
        run: pip install -e ".[dev]" --quiet

      - name: Ruff — check style
        run: ruff check .

      - name: Ruff — check formatting
        run: ruff format --check .

      - name: Mypy — type-check
        run: mypy app --ignore-missing-imports --pretty

  # ── Backend Tests ─────────────────────────────────────────────────────────────
  backend-test:
    name: Backend — Tests & Coverage
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kaats
          POSTGRES_PASSWORD: kaats
          POSTGRES_DB: kaats_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://kaats:kaats@localhost:5432/kaats_test
      AZURE_CLIENT_ID: 00000000-0000-0000-0000-000000000000
      AZURE_TENANT_ID: 00000000-0000-0000-0000-000000000000
      AZURE_CLIENT_SECRET: dummy
      AZURE_SQL_SERVER: localhost
      AZURE_SQL_DATABASE: kaats_test
      COSMOS_ENDPOINT: https://localhost:8081
      COSMOS_KEY: dummy
      SERVICE_BUS_CONNECTION_STRING: "Endpoint=sb://localhost/;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=dummy="
      AZURE_STORAGE_CONNECTION_STRING: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OugPAodDl/S1Kl2lMgXMUvQ==;BlobEndpoint=http://localhost:10000/devstoreaccount1;"

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Pytest with coverage
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend — Lint, Type-check & Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Vitest unit tests
        run: npm test -- --reporter=verbose

      - name: Build (smoke-test Vite output)
        run: npm run build
        env:
          VITE_AZURE_CLIENT_ID: 00000000-0000-0000-0000-000000000000
          VITE_AZURE_TENANT_ID: 00000000-0000-0000-0000-000000000000
          VITE_API_BASE_URL: http://localhost:8000

  # ── Security Scan ─────────────────────────────────────────────────────────────
  security-scan:
    name: Security — SAST & Dependency Audit
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python security tools
        run: pip install bandit pip-audit

      - name: Install backend dependencies (for pip-audit)
        run: pip install -e "backend/.[dev]" --quiet

      - name: Bandit — Python SAST
        run: |
          bandit -r backend/app/ \
            -f sarif \
            -o bandit.sarif \
            --severity-level medium \
            --confidence-level medium \
            -x backend/app/tests || true

      - name: Upload Bandit SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: bandit.sarif
          category: bandit

      - name: pip-audit — Python dependency CVEs
        run: |
          pip-audit \
            --requirement <(pip freeze) \
            --format json \
            --output pip-audit.json || true
          cat pip-audit.json

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: npm audit — JS dependency CVEs
        working-directory: frontend
        run: |
          npm ci --quiet
          npm audit --audit-level=high --json > npm-audit.json || true
          cat npm-audit.json

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python, javascript-typescript
          queries: security-and-quality

      - name: Autobuild (CodeQL)
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: codeql
