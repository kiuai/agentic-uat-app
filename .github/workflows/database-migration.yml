name: Database Migration Safety Check

on:
  push:
    branches: [main]
    paths:
      - "backend/migrations/**"
      - "backend/alembic.ini"
      - "backend/app/models/**"

  pull_request:
    branches: [main]
    paths:
      - "backend/migrations/**"
      - "backend/alembic.ini"
      - "backend/app/models/**"

concurrency:
  group: db-migration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Migration validation ──────────────────────────────────────────────────
  validate:
    name: Validate migrations
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kaats
          POSTGRES_PASSWORD: kaats
          POSTGRES_DB: kaats_migration_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://kaats:kaats@localhost:5432/kaats_migration_test
      AZURE_CLIENT_ID: 00000000-0000-0000-0000-000000000000
      AZURE_TENANT_ID: 00000000-0000-0000-0000-000000000000
      COSMOS_ENDPOINT: https://localhost:8081
      COSMOS_KEY: dummy
      SERVICE_BUS_CONNECTION_STRING: "Endpoint=sb://localhost/;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=dummy="
      AZURE_STORAGE_CONNECTION_STRING: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=dummy;BlobEndpoint=http://localhost:10000/devstoreaccount1;"

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history to detect changed migration files

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Check for pending migrations
        id: check-pending
        run: |
          # alembic check exits non-zero if there are unapplied migrations
          # (i.e. models changed but migration not generated)
          alembic check 2>&1 | tee alembic-check.txt || {
            echo "pending=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Unapplied model changes detected — did you forget to generate a migration?"
          }
          echo "pending=false" >> "$GITHUB_OUTPUT"

      - name: Apply all migrations (upgrade head)
        id: upgrade
        run: |
          alembic upgrade head 2>&1 | tee upgrade.txt
          echo "✓ Upgrade to head succeeded"

      - name: Check all migrations are reversible (downgrade)
        id: downgrade
        run: |
          # Step through each migration and test its downgrade script
          # Get list of revisions from head to base
          REVISIONS=$(alembic history --verbose 2>/dev/null \
            | grep "^Rev:" \
            | awk '{print $2}' \
            | head -10)  # Test last 10 revisions max

          if [[ -z "${REVISIONS}" ]]; then
            echo "No revisions found to test"
            exit 0
          fi

          echo "Testing downgrade for recent revisions..."
          # Downgrade one step at a time and re-upgrade to verify round-trips
          alembic downgrade -1 2>&1
          echo "✓ Downgrade -1 succeeded"
          alembic upgrade head 2>&1
          echo "✓ Re-upgrade to head succeeded"

      - name: Detect destructive operations
        id: destructive-check
        run: |
          FAIL=0

          # Find migration files changed in this push/PR
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- migrations/versions/)
          else
            CHANGED=$(git diff --name-only HEAD~1..HEAD -- migrations/versions/ 2>/dev/null || \
                      find migrations/versions -name "*.py" -newer alembic.ini | head -5)
          fi

          if [[ -z "${CHANGED}" ]]; then
            echo "No migration files changed"
            exit 0
          fi

          echo "Checking migration files for destructive operations:"
          echo "${CHANGED}"

          # Patterns that indicate destructive operations
          DESTRUCTIVE_PATTERNS=(
            "op\.drop_table"
            "op\.drop_column"
            "op\.execute.*DROP"
            "op\.execute.*TRUNCATE"
            "op\.alter_column.*nullable=False"  # Adding NOT NULL without default is risky
          )

          for file in ${CHANGED}; do
            for pattern in "${DESTRUCTIVE_PATTERNS[@]}"; do
              if grep -qE "${pattern}" "${file}" 2>/dev/null; then
                echo "::warning file=${file}::Potentially destructive operation detected: ${pattern}"
                echo "  → Ensure a backup was taken and this is intentional"
                FAIL=1
              fi
            done
          done

          # Check that downgrade scripts aren't empty (just 'pass')
          for file in ${CHANGED}; do
            DOWNGRADE_BODY=$(awk '/^def downgrade/,/^def /' "${file}" 2>/dev/null | tail -n +2 | head -n -1)
            if echo "${DOWNGRADE_BODY}" | grep -qE '^\s*pass\s*$'; then
              echo "::warning file=${file}::Downgrade function is a no-op (just 'pass'). Irreversible migration."
              FAIL=1
            fi
          done

          if [[ $FAIL -eq 1 ]]; then
            echo ""
            echo "⚠️  Migration safety issues detected (see warnings above)."
            echo "    These are warnings, not errors. Review carefully before merging."
          else
            echo "✓ No destructive operations detected"
          fi

      - name: Upload migration check artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: migration-check-results
          path: |
            backend/alembic-check.txt
            backend/upgrade.txt
          retention-days: 7

  # ── Dry-run against staging DB snapshot ──────────────────────────────────
  # This job only runs on pushes to main (not PRs) to avoid staging DB access
  staging-dry-run:
    name: Staging migration dry-run
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Check pending migrations on staging
        run: |
          # Run alembic current in the staging Container App to see what's applied
          echo "Checking current migration state on staging..."
          az containerapp exec \
            --name kaats-staging-api \
            --resource-group rg-kaats-staging \
            --command "alembic current" \
            --output table || echo "::warning::Could not check staging migration state"

          # Check if there are new migrations to apply
          az containerapp exec \
            --name kaats-staging-api \
            --resource-group rg-kaats-staging \
            --command "alembic check" \
            --output table || \
            echo "::notice::New migrations will be applied during staging deployment"
