# docker-compose.override.yml — local development overrides
# Applied automatically by `docker compose up`; do NOT commit secrets here.
services:
  api:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app
    volumes:
      - ./backend:/app
    environment:
      ENVIRONMENT: development
      LOG_LEVEL: DEBUG

  worker:
    volumes:
      - ./backend:/app
    environment:
      ENVIRONMENT: development
      LOG_LEVEL: DEBUG
