repos:
  # ── Python: Ruff (lint + format) ────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  # ── Python: Mypy (type check) ────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        files: ^backend/app/
        args: [--config-file=backend/pyproject.toml]
        additional_dependencies:
          - pydantic>=2.0
          - sqlalchemy[mypy]>=2.0
          - types-passlib

  # ── General ──────────────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  # ── Frontend: ESLint ─────────────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: eslint
        name: ESLint
        language: system
        entry: bash -c 'cd frontend && npx eslint --fix src/**/*.{ts,tsx}'
        files: ^frontend/src/
        types: [file]
        types_or: [ts, tsx]
        pass_filenames: false

      - id: prettier
        name: Prettier
        language: system
        entry: bash -c 'cd frontend && npx prettier --write'
        files: ^frontend/src/
        types_or: [ts, tsx, css, json]
